<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRX4 — Dashboard</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,500;0,700;0,900;1,400&family=Pacifico&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <style>
    /* ============================================================
       CSS VARIABLES & RESET
    ============================================================ */
    :root {
      --body-color:        30 30 40;
      --font-color:        255 255 255;
      --theme-background:  18 18 24;
      --accent:            #00d8ff;
      --accent-rgb:        0, 216, 255;
      --glass:             rgba(255,255,255,0.07);
      --glass-hover:       rgba(255,255,255,0.13);
      --radius-sm:         0.35rem;
      --radius-md:         0.6rem;
      --radius-lg:         1rem;
      --transition:        0.25s ease;

      /* Atom animation */
      --atom-size:            160px;
      --atom-color-hex:       #00d8ff;
      --atom-color-rgb:       0, 216, 255;
      --nucleus-size:         calc(var(--atom-size) / 5);
      --electron-color-hex:   #99f8ff;
      --electron-size:        calc(var(--atom-size) / 25);
      --electron-orbit-size:  calc(var(--atom-size) / 2.5);
      --electron-speed:       1.2s;
      --electron-speed-alpha: 1s;
      --electron-speed-omega: 0.8s;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background-color: rgb(var(--body-color));
      font-family: "Noto Sans", sans-serif;
      color: rgb(var(--font-color));
    }

    /* Scrollbar */
    ::-webkit-scrollbar        { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track  { background: transparent; }
    ::-webkit-scrollbar-thumb  { background: rgba(255,255,255,0.15); border-radius: 2px; }

    h1,h2,h3,h4,input,select,button,span,a,p {
      color: rgb(var(--font-color));
      font-family: inherit;
      font-size: 1rem;
      font-weight: 400;
    }

    button, a, input { outline: none; }
    a { text-decoration: none; }

    /* ============================================================
       LAYOUT
    ============================================================ */
    #main-wrapper {
      min-height: 100vh;
      overflow-y: auto;
    }

    #content {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 3rem;
    }

    /* ============================================================
       TOP NAV LINKS
    ============================================================ */
    #links-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem 1.25rem;
      padding: 0.6rem 0;
    }

    #links-container > a {
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      transition: color var(--transition), background var(--transition);
    }

    #links-container > a:hover {
      color: #fff;
      background: var(--glass-hover);
    }

    /* ============================================================
       HEADER — ATOM + PROFILE
    ============================================================ */
    #header-container {
      margin-top: 1.25rem;
    }

    .parent {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 1.5rem 2rem;
    }

    /* Atom widget */
    .child.atom-wrapper {
      flex-shrink: 0;
    }

    /* Profile side */
    .child.profile-side {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.75rem;
    }

    #user-menu-button {
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      border-radius: 50%;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    #user-menu-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.4);
    }

    #user-menu-button img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 2px solid rgba(var(--accent-rgb), 0.4);
    }

    /* ============================================================
       SOCIAL BUTTONS
    ============================================================ */
    .social-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
    }

    .social-button {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #fff;
      text-decoration: none;
      transition: transform var(--transition);
      overflow: hidden;
    }

    .social-button::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      width: 0;
      height: 0;
      left: 50%;
      top: -1px;
      transition: 0.3s;
    }

    .social-button:hover { transform: translateY(-2px); color: #fff; }
    .social-button:hover::after {
      width: calc(100% + 2px);
      height: calc(100% + 2px);
      margin-left: calc(-50% - 1px);
    }

    .social-button i {
      position: relative;
      z-index: 1;
      font-size: 16px;
      transition: 0.3s;
    }

    /* Tooltip */
    .social-button .tooltiptext {
      visibility: hidden;
      width: 90px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 0.7rem;
      text-align: center;
      border-radius: 5px;
      padding: 4px 0;
      position: absolute;
      z-index: 10;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .social-button .tooltiptext::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -5px;
      border: 5px solid transparent;
      border-top-color: rgba(0,0,0,0.85);
    }
    .social-button:hover .tooltiptext { visibility: visible; opacity: 1; }

    /* Social colors */
    .social-button--youtube   { color: #ff0000; }
    .social-button--youtube::after   { background: #ff0000; }
    .social-button--whatsapp  { color: #25d366; }
    .social-button--whatsapp::after  { background: #25d366; }
    .social-button--telegram  { color: #26a1df; }
    .social-button--telegram::after  { background: #26a1df; }
    .social-button--x-twitter { color: #222; }
    .social-button--x-twitter::after { background: #222; }
    .social-button--instagram { color: #e4405f; }
    .social-button--instagram::after { background: #e4405f; }
    .social-button--reddit    { color: #ff4500; }
    .social-button--reddit::after    { background: #ff4500; }
    .social-button--facebook  { color: #3b5999; }
    .social-button--facebook::after  { background: #3b5999; }
    .social-button--messenger { color: #0084ff; }
    .social-button--messenger::after { background: #0084ff; }
    .social-button--snapchat  { color: #eec900; }
    .social-button--snapchat::after  { background: #eec900; }
    .social-button--gitHub    { color: #211f1f; }
    .social-button--gitHub::after    { background: #211f1f; }
    .social-button--codePen   { color: #212121; }
    .social-button--codePen::after   { background: #212121; }

    /* ============================================================
       EDITABLE TITLE
    ============================================================ */
    .title-wrapper {
      text-align: center;
      margin-top: 2rem;
      position: relative;
    }

    #editable-text {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
      font-weight: 100;
      color: #fff;
      text-shadow: 0 0 20px var(--accent);
      animation: blinkH1 5s infinite;
      display: inline-block;
      min-width: 2ch;
      outline: none;
      cursor: text;
    }

    #editable-text:empty::before {
      content: "SRX4";
      opacity: 0.4;
    }

    @keyframes blinkH1 {
      0%,19%,21%,60%,62%,64%,100% { color: #fff; text-shadow: 0 0 20px var(--accent); }
      20%,61%,63% { color: #9e9e9e; text-shadow: none; }
    }

    /* ============================================================
       SEARCH
    ============================================================ */
    #search-container {
      display: flex;
      gap: 0.25rem;
      margin-top: 1.25rem;
    }

    #search-input-container {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--glass);
      padding: 0 1rem;
      border-radius: var(--radius-sm) 0 0 var(--radius-md);
      border: 1px solid rgba(255,255,255,0.08);
      transition: background var(--transition), border-color var(--transition);
    }

    #search-input-container:focus-within {
      background: var(--glass-hover);
      border-color: rgba(var(--accent-rgb), 0.35);
    }

    #search-input-container i {
      color: rgba(255,255,255,0.45);
      font-size: 0.9rem;
    }

    #search-input-container input {
      flex: 1;
      height: 3rem;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 0.95rem;
    }

    #search-input-container input::placeholder { color: rgba(255,255,255,0.35); }

    #search-container > button {
      width: 3.25rem;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.08);
      border-left: none;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    #search-container > button:hover { background: var(--glass-hover); color: #fff; }
    #search-container > #mic-button   { border-radius: 0; }
    #search-container > #image-button { border-radius: 0; }
    #search-container > #location-button {
      border-radius: 0 var(--radius-sm) var(--radius-md) 0;
    }

    /* ============================================================
       APPS GRID
    ============================================================ */
    #apps-container {
      display: grid;
      gap: 0.25rem;
      grid-template-columns: repeat(2, 1fr);
      margin-top: 1.75rem;
    }

    #apps-container > a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 0.85rem 0.75rem;
      text-decoration: none;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }

    #apps-container > a:hover {
      background: var(--glass-hover);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    #apps-container > a:first-child      { border-radius: var(--radius-md) var(--radius-sm) var(--radius-sm) var(--radius-sm); }
    #apps-container > a:nth-child(2)     { border-radius: var(--radius-sm) var(--radius-md) var(--radius-sm) var(--radius-sm); }
    #apps-container > a:nth-last-child(2){ border-radius: var(--radius-sm) var(--radius-sm) var(--radius-sm) var(--radius-md); }
    #apps-container > a:last-child       { border-radius: var(--radius-sm) var(--radius-sm) var(--radius-md) var(--radius-sm); }

    #apps-container > a > i,
    #apps-container > a > img {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      font-size: 1.5rem;
      line-height: 2rem;
      text-align: center;
      object-fit: contain;
    }

    #apps-container > a > .label {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    #apps-container > a > .label > .name {
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #apps-container > a > .label > .url {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* App icon colors */
    #apps-container > a:nth-child(1) i { color: #f48024; }
    #apps-container > a:nth-child(2) i { color: #ff0000; }
    #apps-container > a:nth-child(3) i { color: #25d366; }
    #apps-container > a:nth-child(4) i { color: #26a1df; }
    #apps-container > a:nth-child(6) i { color: #10a37f; }

    /* Editable URL — prevent nav on click */
    .url[contenteditable="true"] { cursor: text; }

    /* ============================================================
       ATOM ANIMATION
    ============================================================ */
    main { position: relative; }

    .atom {
      position: relative;
      width: var(--atom-size);
      height: var(--atom-size);
      animation: 8s atom infinite cubic-bezier(1,.25,0,.75);
    }
    @keyframes atom {
      0%    { transform: rotate(0deg)    scale(1);  }
      12.5% { transform: rotate(-45deg)  scale(.9); }
      25%   { transform: rotate(-90deg)  scale(1);  }
      37.5% { transform: rotate(-135deg) scale(.9); }
      50%   { transform: rotate(-180deg) scale(1);  }
      62.5% { transform: rotate(-225deg) scale(.9); }
      75%   { transform: rotate(-270deg) scale(1);  }
      87.5% { transform: rotate(-315deg) scale(.9); }
      100%  { transform: rotate(-360deg) scale(1);  }
    }

    .atom::before {
      content: '';
      display: block;
      position: absolute;
      top: 50%; left: 50%;
      width: var(--nucleus-size);
      height: var(--nucleus-size);
      margin-top: calc(var(--nucleus-size) / -2);
      margin-left: calc(var(--nucleus-size) / -2);
      background: var(--electron-color-hex);
      border-radius: 50%;
      box-shadow: 0 0 6px 2px var(--atom-color-hex);
      animation: 2s nucleus infinite cubic-bezier(.65,0,.35,1);
    }
    @keyframes nucleus {
      0%,100% { transform: scale(1); }
      25%     { transform: scale(.9); }
      75%     { transform: scale(.85); }
    }

    .atom > [class^="electron"] {
      border-top:    1px solid rgba(var(--atom-color-rgb), .5);
      border-right:  2px solid rgba(var(--atom-color-rgb), .35);
      border-bottom: 4px solid rgba(var(--atom-color-rgb), .2);
      border-left:   2px solid rgba(var(--atom-color-rgb), 0);
      border-radius: 50%;
      width: 100%;
      height: var(--electron-orbit-size);
      position: absolute;
      top: 50%;
      margin-top: calc(var(--electron-orbit-size) / -2);
      animation: var(--electron-speed) electron-orbit infinite linear;
    }
    .atom > .electron-alpha { transform: rotate(60deg);  animation-duration: var(--electron-speed-alpha); }
    .atom > .electron-omega { transform: rotate(-60deg); animation-duration: var(--electron-speed-omega); }

    @keyframes electron-orbit {
      0%   { border-top-color: rgba(var(--atom-color-rgb),.5);  border-right-color: rgba(var(--atom-color-rgb),.35); border-bottom-color: rgba(var(--atom-color-rgb),.2);  border-left-color:  rgba(var(--atom-color-rgb),0); }
      25%  { border-top-color: rgba(var(--atom-color-rgb),.35); border-right-color: rgba(var(--atom-color-rgb),.2);  border-bottom-color: rgba(var(--atom-color-rgb),0);   border-left-color:  rgba(var(--atom-color-rgb),.5); }
      50%  { border-top-color: rgba(var(--atom-color-rgb),.2);  border-right-color: rgba(var(--atom-color-rgb),0);   border-bottom-color: rgba(var(--atom-color-rgb),.5);  border-left-color:  rgba(var(--atom-color-rgb),.35); }
      75%  { border-top-color: rgba(var(--atom-color-rgb),0);   border-right-color: rgba(var(--atom-color-rgb),.5);  border-bottom-color: rgba(var(--atom-color-rgb),.35); border-left-color:  rgba(var(--atom-color-rgb),.2); }
      100% { border-top-color: rgba(var(--atom-color-rgb),.5);  border-right-color: rgba(var(--atom-color-rgb),.35); border-bottom-color: rgba(var(--atom-color-rgb),.2);  border-left-color:  rgba(var(--atom-color-rgb),0); }
    }

    .atom [class^="electron"]::after {
      content: '';
      display: block;
      width:  var(--electron-size);
      height: var(--electron-size);
      background: var(--electron-color-hex);
      border-radius: 50%;
      box-shadow: 0 0 4px 1px var(--atom-color-hex);
      position: absolute;
      top: 50%;
      left: calc(var(--electron-size) / -1);
      margin-top: calc(var(--electron-size) / -2);
      animation: calc(var(--electron-speed) * 2) electron infinite ease-in-out;
    }
    .atom .electron-alpha::after { animation-duration: calc(var(--electron-speed-alpha) * 2); }
    .atom .electron-omega::after { animation-duration: calc(var(--electron-speed-omega) * 2); }

    @keyframes electron {
      0%    { left: calc(var(--electron-size) / -1); transform: scale(1);   }
      12.5% { top: 100%;   transform: scale(1.5);  }
      25%   { left: 100%;  transform: scale(1);    }
      37.5% { top: 0%;     transform: scale(.25);  }
      50%   { left: calc(var(--electron-size) / -1); transform: scale(1);   }
      62.5% { top: 100%;   transform: scale(1.5);  }
      75%   { left: 100%;  transform: scale(1);    }
      87.5% { top: 0%;     transform: scale(.25);  }
      100%  { left: calc(var(--electron-size) / -1); transform: scale(1);   }
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 520px) {
      .parent { flex-direction: column; align-items: center; padding: 1.25rem; }
      .child.profile-side { align-items: center; }
      .social-buttons { justify-content: center; }
      #apps-container { grid-template-columns: 1fr; }
      #apps-container > a:first-child,
      #apps-container > a:nth-child(2),
      #apps-container > a:nth-last-child(2),
      #apps-container > a:last-child { border-radius: var(--radius-sm); }
      #apps-container > a:first-child { border-radius: var(--radius-md) var(--radius-md) var(--radius-sm) var(--radius-sm); }
      #apps-container > a:last-child  { border-radius: var(--radius-sm) var(--radius-sm) var(--radius-md) var(--radius-md); }
    }
  </style>
</head>

<body>
<div id="main-wrapper">
  <div id="content">

    <!-- TOP NAV -->
    <nav id="links-container">
      <a href="https://gmail.com">Gmail</a>
      <a href="https://2026.com">2026</a>
      <a href="https://2025.com">2025</a>
      <a href="https://2024.com">2024</a>
      <a href="https://2023.com">2023</a>
      <a href="https://keep.google.com">Keep</a>
      <a href="https://discord.com/guild-discovery">Discord</a>
      <a href="https://www.pinterest.com/">Pinterest</a>
      <a href="#">About</a>
    </nav>

    <!-- HEADER -->
    <div id="header-container">
      <div class="parent">

        <!-- Atom animation -->
        <div class="child atom-wrapper">
          <main>
            <div class="atom">
              <div class="electron"></div>
              <div class="electron-alpha"></div>
              <div class="electron-omega"></div>
            </div>
          </main>
        </div>

        <!-- Profile & social -->
        <div class="child profile-side">
          <button type="button" id="user-menu-button" title="Profile">
            <img
              src="https://drive.google.com/thumbnail?id=1iPe7kKqQDYZSJz_jQspX-nmZGPNmdDKZ"
              alt="Profile — Deer"
              onerror="this.style.display='none'"
            />
          </button>

          <div class="social-buttons">

            <a href="https://www.youtube.com" class="social-button social-button--youtube" target="_blank" rel="noopener">
              <i class="fab fa-youtube"></i>
              <span class="tooltiptext">YouTube</span>
            </a>

            <a href="https://web.whatsapp.com" class="social-button social-button--whatsapp" target="_blank" rel="noopener">
              <i class="fa-brands fa-whatsapp"></i>
              <span class="tooltiptext">WhatsApp</span>
            </a>

            <a href="https://web.telegram.org/a" class="social-button social-button--telegram" target="_blank" rel="noopener">
              <i class="fa-brands fa-telegram"></i>
              <span class="tooltiptext">Telegram</span>
            </a>

            <a href="https://twitter.com" class="social-button social-button--x-twitter" target="_blank" rel="noopener">
              <i class="fab fa-twitter"></i>
              <span class="tooltiptext">X / Twitter</span>
            </a>

            <a href="https://www.instagram.com" class="social-button social-button--instagram" target="_blank" rel="noopener">
              <i class="fab fa-instagram"></i>
              <span class="tooltiptext">Instagram</span>
            </a>

            <a href="https://www.reddit.com/r/popular" class="social-button social-button--reddit" target="_blank" rel="noopener">
              <i class="fa-brands fa-reddit"></i>
              <span class="tooltiptext">Reddit</span>
            </a>

            <a href="https://www.facebook.com" class="social-button social-button--facebook" target="_blank" rel="noopener">
              <i class="fab fa-facebook-f"></i>
              <span class="tooltiptext">Facebook</span>
            </a>

            <a href="https://www.messenger.com" class="social-button social-button--messenger" target="_blank" rel="noopener">
              <i class="fab fa-facebook-messenger"></i>
              <span class="tooltiptext">Messenger</span>
            </a>


            <a href="https://github.com/explore" class="social-button social-button--gitHub" target="_blank" rel="noopener">
              <i class="fab fa-github"></i>
              <span class="tooltiptext">GitHub</span>
            </a>

            <a href="https://codepen.io" class="social-button social-button--codePen" target="_blank" rel="noopener">
              <i class="fab fa-codepen"></i>
              <span class="tooltiptext">CodePen</span>
            </a>

          </div><!-- /.social-buttons -->
        </div><!-- /.profile-side -->

      </div><!-- /.parent -->
    </div><!-- /#header-container -->

    <!-- EDITABLE TITLE -->
    <div class="title-wrapper">
      <div
        id="editable-text"
        contenteditable="true"
        spellcheck="false"
        aria-label="Editable page title"
      ></div>
    </div>

    <!-- SEARCH -->
    <div id="search-container">
      <div id="search-input-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="text"
          id="search"
          placeholder="Search anything…"
          autocomplete="off"
          aria-label="Search"
        />
      </div>

      <button id="image-button" type="button" title="Google Lens" onclick="googleLens()">

     SCRIPTS
============================================================ -->
<script>
  /* ---- Editable title (localStorage) ---- */
  const editableText = document.getElementById('editable-text');

  const savedTitle = localStorage.getItem('savedText');
  if (savedTitle) editableText.textContent = savedTitle;

  editableText.addEventListener('input', function () {
    localStorage.setItem('savedText', this.textContent);
  });

  // Prevent newlines on Enter — submit search instead
  editableText.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
  });

  /* ---- Editable custom app URL ---- */
  const customUrl  = document.getElementById('custom-url');
  const customLink = document.getElementById('custom-link');
  const customIcon = customLink.querySelector('i');

  // Restore saved custom URL
  const savedUrl = localStorage.getItem('customUrl');
  if (savedUrl) {
    customUrl.textContent = savedUrl;
    applyCustomUrl(savedUrl);
  }

  // Block link navigation when clicking editable span
  customUrl.addEventListener('click', function (e) { e.preventDefault(); });

  customUrl.addEventListener('input', function () {
    const val = this.textContent.trim();
    localStorage.setItem('customUrl', val);
    applyCustomUrl(val);
  });

  function applyCustomUrl(val) {
    if (!val) return;
    const href = val.startsWith('http') ? val : 'https://' + val;
    customLink.href = href;

    try {
      const hostname = new URL(href).hostname.replace('www.', '');
      customLink.querySelector('.name').textContent =
        hostname.charAt(0).toUpperCase() + hostname.slice(1).split('.')[0];
      const brand = hostname.split('.')[0];
      customIcon.className = 'fa-brands fa-' + brand;
    } catch (_) {}
  }

  /* ---- Search ---- */
  function googleSearch() {
    const query = document.getElementById('search').value.trim();
    if (!query) return;
    window.open('https://www.google.com/search?q=' + encodeURIComponent(query), '_blank');
  }

  function googleLens() {
    window.open('https://lens.google.com/', '_blank');
  }

  function voiceSearch() {
    // Web Speech API voice search
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      alert('Voice search is not supported in this browser.');
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = 'en-US';
    rec.start();
    rec.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      document.getElementById('search').value = transcript;
    };
    rec.onerror = () => alert('Could not capture audio. Please check mic permissions.');
  }

  // Also search on Enter key
  document.getElementById('search').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') googleSearch();
  });
</script>
